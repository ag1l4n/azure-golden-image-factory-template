---
- name: Apply CIS Level 1 Baseline (Azure Tailored)
  hosts: default
  become: yes
  
  vars:
    # 1. Enable the Level 1 Baseline
    ubtu22cis_level_1: true
    ubtu22cis_level_2: false

    # 2. Azure Provisioning & Cloud-Init Exemptions (CRITICAL FOR BOOT)
    ubtu22cis_rule_1_1_1_1: false  # cramfs
    ubtu22cis_rule_1_1_1_2: false  # freevxfs
    ubtu22cis_rule_1_1_1_3: false  # jffs2
    ubtu22cis_rule_1_1_1_4: false  # hfs
    ubtu22cis_rule_1_1_1_5: false  # hfsplus
    ubtu22cis_rule_1_1_1_6: false  # squashfs (Snap relies on this)
    ubtu22cis_rule_1_1_1_7: false  # udf (Azure cloud-init relies on this)
    ubtu22cis_rule_1_1_1_8: false  # fat/vfat (UEFI boot relies on this)

    # 3. Cloud Boot & Grub Exemptions
    ubtu22cis_rule_1_4_1: false    # Disable GRUB bootloader password requirement

    # 4. Azure Networking Exemption (Let Azure NSG handle the firewall & Wi-Fi)
    ubtu22cis_setup_firewall: false
    ubtu22cis_rule_3_1_2: false    # Skip Wi-Fi checks 
    ubtu22cis_rule_3_4_1_1: false
    ubtu22cis_rule_3_4_1_2: false
    ubtu22cis_rule_3_4_1_3: false
    ubtu22cis_rule_3_4_2_1: false
    ubtu22cis_rule_3_4_2_2: false

    # 5. Packer Build & Cloud Exemptions (SSH & Passwords)
    ubtu22cis_rule_5_2_4: false    # Allow passwordless sudo for the packer user
    ubtu22cis_rule_5_4_2_4: false  # Do not require a root password
    ubtu22cis_rule_5_2_16: false   # Disable strict SSH idle timeouts
    ubtu22cis_rule_5_2_17: false   # Disable SSH MaxAuthTries limits 
    ubtu22cis_rule_5_3_1: false    # Don't break Azure's custom SSH key directories
    
    # WHITELIST THE USERS
    ubtu22cis_sshd_allow_users: "packer azureuser ubuntu sysadmin"

    # 6. Disable AppArmor/Auditd reboots during the pipeline
    ubtu22cis_reboot_required: false

  roles:
    - role: ubuntu22-cis

  # THE GOLD STANDARD FIX: Disable internal firewalls so Azure NSG can take over
  post_tasks:
    - name: DevSecOps Override - Disable local firewall to allow Azure NSG control
      systemd:
        name: "{{ item }}"
        state: stopped
        enabled: no
        masked: yes
      loop:
        - nftables
        - ufw
      ignore_errors: true
